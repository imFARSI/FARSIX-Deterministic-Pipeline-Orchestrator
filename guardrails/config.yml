# NeMo Guardrails Configuration for FARSIX
# This config connects to NVIDIA NIM API for semantic intent classification.

models:
  - type: main
    engine: openai
    model: meta/llama-3.1-8b-instruct
    parameters:
      base_url: "https://integrate.api.nvidia.com/v1"
      temperature: 0.0

# Use the Colang rules defined in safety_rules.co
colang_version: "1.0"

instructions:
  - type: general
    content: |
      You are a semantic safety auditing agent for FARSIX enterprise workflows.
      Your role is to read the output of the primary reasoning agent and semantically classify
      if it contains logical inconsistencies, hallucinations, or safety violations based on your rules.
      You do NOT generate new content. You only validate existing content.

# Enable LLM text generation for true semantic intent classification
enable_multi_step_generation: true
